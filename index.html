<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>trevor welsh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #EAE7E4;
      font-family: 'Instrument Serif', serif;
    }

    .hero {
      height: calc(100vh - 80px);
      padding: 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(48px, 10vw, 80px);
      font-weight: 400;
      color: #1a1a1a;
      line-height: 1.05;
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 18px;
      color: #555;
      letter-spacing: 0.01em;
    }

    nav {
      padding: 6rem 2.5rem 3rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .nav-col {
      display: flex;
      flex-direction: column;
    }

    .nav-label {
      font-size: 13px;
      color: #999;
      letter-spacing: 0.04em;
      padding-bottom: 0.5rem;
    }

    nav a {
      font-size: 24px;
      color: #1a1a1a;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.35rem 0;
      transition: opacity 0.15s;
    }

    nav a:hover { opacity: 0.5; }

    nav a svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    nav a:hover svg { transform: translate(2px, -2px); }

    .banner {
      width: 100%;
      overflow: hidden;
    }

    .banner img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>trevor welsh</h1>
    <p class="subtitle">UX/UI Designer</p>
  </div>
  <div class="banner">
    <img src="banner.jpg" alt="portfolio works" />
  </div>
  <nav>
    <div class="nav-col">
      <span class="nav-label">works</span>
      <a href="https://www.figma.com/design/8p7jisCmCjNazG778y5h86/Trevor-s-Portfolio" target="_blank" rel="noopener">
        figma portfolio

      </a>
      <a href="https://www.upwork.com/freelancers/trevorwelsh" target="_blank" rel="noopener">
        upwork
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

    <div class="nav-col">
      <span class="nav-label">connect</span>

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>

      </a>
    </div>
  </nav>
</body>
</html>
